<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exploradores del Universo 🚀</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f5f5f2;
      --color-bg-tertiary: #eeecea;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-border: rgba(0,0,0,0.12);
      --color-border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: system-ui, -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #1e1e1c;
        --color-bg-secondary: #2c2c2a;
        --color-bg-tertiary: #3a3a38;
        --color-text-primary: #f0efea;
        --color-text-secondary: #b4b2a9;
        --color-border: rgba(255,255,255,0.10);
        --color-border-md: rgba(255,255,255,0.20);
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg-tertiary);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: 1rem;
    }

    .game-container {
      max-width: 700px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      padding: 1.5rem 1rem;
      background: linear-gradient(135deg, #042C53, #185FA5);
      border-radius: var(--radius-lg);
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '✨ ⭐ 🌟 ✨ ⭐';
      position: absolute;
      top: 8px; left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
      letter-spacing: 8px;
    }
    .header h1 { color: #fff; font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .header p  { color: #B5D4F4; font-size: 14px; }

    .score-bar {
      display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .score-pill {
      flex: 1; min-width: 90px;
      background: var(--color-bg-primary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 8px 10px; text-align: center;
      cursor: pointer; transition: background 0.15s;
      position: relative; overflow: hidden;
    }
    .score-pill:hover { background: var(--color-bg-secondary); }
    .score-pill.active { border-color: #378ADD; background: #E6F1FB; }
    @media (prefers-color-scheme: dark) { .score-pill.active { background: #0C447C33; } }
    .score-pill .cat-emoji { font-size: 18px; display: block; margin-bottom: 2px; }
    .score-pill .cat-name  { font-size: 10px; color: var(--color-text-secondary); line-height: 1.2; }
    .score-pill .cat-pts   { font-size: 13px; font-weight: 600; color: #185FA5; }
    .score-pill .cat-progress {
      position: absolute; bottom: 0; left: 0;
      height: 3px; background: #378ADD;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      transition: width 0.3s;
    }

    .total-score {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
      border: 0.5px solid var(--color-border);
    }
    .total-score .label { font-size: 13px; color: var(--color-text-secondary); }
    .total-score .pts   { font-size: 20px; font-weight: 600; color: #185FA5; }
    .total-score .stars { font-size: 16px; }

    .progress-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
    }
    .progress-bar-outer {
      flex: 1; height: 8px;
      background: var(--color-bg-secondary);
      border-radius: 4px; overflow: hidden;
      border: 0.5px solid var(--color-border);
    }
    .progress-bar-inner { height: 100%; background: #378ADD; border-radius: 4px; transition: width 0.4s; }
    .progress-label { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }

    .category-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1rem; padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border);
      background: var(--color-bg-primary);
    }
    .category-header .cat-big-emoji { font-size: 28px; }
    .category-header h2 { font-size: 16px; font-weight: 500; }
    .category-header .cat-desc { font-size: 12px; color: var(--color-text-secondary); }
    .category-header .cat-badge {
      margin-left: auto;
      background: #E6F1FB; color: #0C447C;
      font-size: 11px; padding: 4px 10px;
      border-radius: 20px; white-space: nowrap;
    }
    @media (prefers-color-scheme: dark) {
      .category-header .cat-badge { background: #0C447C44; color: #85B7EB; }
    }

    .visual-card {
      background: var(--color-bg-secondary);
      border-radius: var(--radius-md);
      padding: 14px; margin-bottom: 1rem;
      border: 0.5px solid var(--color-border);
      text-align: center; font-size: 13px;
      color: var(--color-text-secondary); line-height: 1.6;
    }
    .visual-card .vc-title { font-size: 12px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }

    .question-card {
      background: var(--color-bg-primary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1.25rem; margin-bottom: 1rem;
    }
    .q-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .q-num {
      min-width: 28px; height: 28px; border-radius: 50%;
      background: #E6F1FB; color: #0C447C;
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    @media (prefers-color-scheme: dark) { .q-num { background: #0C447C55; color: #85B7EB; } }
    .q-type-badge {
      font-size: 10px; padding: 2px 8px;
      border-radius: 20px; margin-left: auto;
      white-space: nowrap; flex-shrink: 0;
    }
    .q-type-mc   { background: #EAF3DE; color: #27500A; }
    .q-type-tf   { background: #FAEEDA; color: #633806; }
    .q-type-fill { background: #FBEAF0; color: #72243E; }
    .q-type-match{ background: #EEEDFE; color: #3C3489; }
    .q-text {
      font-size: 15px; color: var(--color-text-primary);
      line-height: 1.5; flex: 1;
    }

    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .option-btn {
      padding: 10px 12px;
      background: var(--color-bg-secondary);
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-md);
      font-size: 13px; cursor: pointer;
      text-align: left; line-height: 1.4;
      transition: all 0.15s;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
    }
    .option-btn:hover:not([disabled]) { background: #E6F1FB; border-color: #378ADD; }
    .option-btn.correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
    .option-btn.wrong   { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }

    .tf-btns { display: flex; gap: 10px; }
    .tf-btn {
      flex: 1; padding: 12px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--color-border-md);
      cursor: pointer; font-size: 14px; font-weight: 500;
      transition: all 0.15s;
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      text-align: center; font-family: var(--font-sans);
    }
    .tf-btn:hover:not([disabled]) { transform: scale(1.02); }
    .tf-btn.correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
    .tf-btn.wrong   { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }

    .fill-area { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .fill-blank {
      border: none; border-bottom: 2px solid #378ADD;
      background: transparent; font-size: 14px;
      padding: 4px 8px; color: var(--color-text-primary);
      min-width: 140px; outline: none;
      font-family: var(--font-sans);
    }
    .fill-blank:focus { border-bottom-color: #042C53; }
    .check-btn {
      padding: 8px 14px;
      background: #E6F1FB; border: 0.5px solid #378ADD;
      border-radius: var(--radius-md);
      font-size: 12px; cursor: pointer; color: #0C447C;
      font-family: var(--font-sans);
    }
    .check-btn:hover { background: #B5D4F4; }

    .match-area { display: flex; gap: 12px; }
    .match-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .match-item {
      padding: 8px 10px; border-radius: var(--radius-md);
      font-size: 12px; line-height: 1.3;
      border: 0.5px solid var(--color-border);
    }
    .match-left  { background: #EEEDFE; border-color: #AFA9EC; color: #26215C; cursor: pointer; }
    .match-left:hover  { background: #CECBF6; }
    .match-left.selected { background: #534AB7; color: #fff; }
    .match-left.matched  { background: #EAF3DE; border-color: #639922; color: #27500A; }
    .match-right { background: var(--color-bg-secondary); cursor: pointer; }
    .match-right:hover  { background: #E1F5EE; }
    .match-right.matched { background: #EAF3DE; border-color: #639922; color: #27500A; }
    .match-hint { font-size: 11px; color: var(--color-text-secondary); margin-top: 6px; }

    .feedback {
      margin-top: 10px; padding: 8px 12px;
      border-radius: var(--radius-md); font-size: 13px; display: none;
    }
    .feedback.show { display: block; }
    .feedback.ok { background: #EAF3DE; color: #27500A; }
    .feedback.no { background: #FCEBEB; color: #791F1F; }
    .q-points { font-size: 11px; color: var(--color-text-secondary); margin-top: 6px; }

    .nav-btns { display: flex; gap: 8px; margin-top: 1.5rem; flex-wrap: wrap; }
    .nav-btn {
      flex: 1; padding: 10px;
      border: 0.5px solid var(--color-border-md);
      border-radius: var(--radius-md);
      background: var(--color-bg-secondary);
      font-size: 13px; cursor: pointer;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
    }
    .nav-btn:hover { background: #E6F1FB; }
    .nav-btn.primary { background: #185FA5; color: #fff; border-color: #185FA5; }
    .nav-btn.primary:hover { background: #0C447C; }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .moon-phases { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 6px 0; }
    .moon-ph { text-align: center; font-size: 11px; color: var(--color-text-secondary); }
    .moon-ph .phase-icon { font-size: 22px; display: block; }

    .congrats { text-align: center; padding: 2rem 1rem; }
    .congrats .big-emoji { font-size: 60px; display: block; margin-bottom: 12px; }
    .congrats h2 { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
    .congrats p  { font-size: 14px; color: var(--color-text-secondary); }
    .star-display { font-size: 28px; letter-spacing: 4px; margin: 12px 0; }

    .summary-card {
      background: var(--color-bg-primary);
      border: 0.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1.25rem; margin-top: 1rem;
    }
    .summary-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .summary-bar-outer {
      flex: 1; height: 6px; background: var(--color-bg-secondary);
      border-radius: 3px; overflow: hidden;
    }
    .summary-bar-inner { height: 100%; background: #378ADD; border-radius: 3px; }

    @media (max-width: 480px) {
      .options-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 20px; }
      .score-pill .cat-name { font-size: 9px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1 style="position:absolute;left:-9999px">Exploradores del Universo — Recurso didáctico interactivo</h1>

    <span class="pts" id="totalPts">0 pts</span>
    <span class="stars" id="starDisplay">☆☆☆☆☆</span>
  </div>

  <div class="score-bar" id="scorePills"></div>
  <div id="mainContent"></div>
</div>

const TYPE_BADGE = { mc:'Selección múltiple', tf:'Verdadero / Falso', fill:'Completar', match:'Emparejamiento' };
const TYPE_CLS   = { mc:'q-type-mc', tf:'q-type-tf', fill:'q-type-fill', match:'q-type-match' };
const VISUAL_TITLES = ['🪐 El Sistema Solar','🌙 Fases de la Luna','🌍 Capas de la Tierra','🌑 Eclipse Solar','✨ La Vía Láctea'];

let state = { cat:0, qIdx:0, answered:{}, matchSel:null, matchDone:{} };

function getKey(cat, idx) { return cat+'_'+idx; }
function catMaxPts(cat)   { return QUESTIONS[cat].reduce((s,q)=>s+q.pts,0); }
function totalPts()       { return CATS.reduce((s,c)=>s+c.pts,0); }
function maxPts()         { return Object.values(QUESTIONS).reduce((s,qs)=>s+qs.reduce((a,q)=>a+q.pts,0),0); }
function getStars()       {
  const p = maxPts()>0 ? totalPts()/maxPts() : 0;
  if(p>=0.9) return '⭐⭐⭐⭐⭐';
  if(p>=0.7) return '⭐⭐⭐⭐';
  if(p>=0.5) return '⭐⭐⭐';
  if(p>=0.3) return '⭐⭐';
  if(p>0)    return '⭐';
  return '☆☆☆☆☆';
}

function updateHeader() {
  document.getElementById('totalPts').textContent = totalPts()+' pts';
  document.getElementById('starDisplay').textContent = getStars();
  document.getElementById('scorePills').innerHTML = CATS.map((c,i)=>{
    const pct = catMaxPts(i)>0 ? (c.pts/catMaxPts(i)*100) : 0;
    return `<div class="score-pill${state.cat===i?' active':''}" onclick="switchCat(${i})">
      <span class="cat-emoji">${c.emoji}</span>
      <span class="cat-name">${c.name.split(' ').slice(0,2).join(' ')}</span>
      <span class="cat-pts">${c.pts} pts</span>
      <div class="cat-progress" style="width:${pct.toFixed(0)}%"></div>
    </div>`;
  }).join('');
}

function render() {
  updateHeader();
  const qs  = QUESTIONS[state.cat];
  const q   = qs[state.qIdx];
  const key = getKey(state.cat, state.qIdx);
  const done= state.answered[key];

  const progress = `<div class="progress-row">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" style="width:${(state.qIdx/qs.length*100).toFixed(0)}%"></div>
    </div>
    <span class="progress-label">Pregunta ${state.qIdx+1} de ${qs.length}</span>
  </div>`;

  const catH = `<div class="category-header">
    <span class="cat-big-emoji">${CATS[state.cat].emoji}</span>
    <div>
      <h2>${CATS[state.cat].name}</h2>
      <div class="cat-desc">${CAT_DESCS[state.cat]}</div>
    </div>
    <div class="cat-badge">${CATS[state.cat].pts} / ${catMaxPts(state.cat)} pts</div>
  </div>`;

  const visual = `<div class="visual-card">
    <div class="vc-title">${VISUAL_TITLES[state.cat]}</div>
    ${VISUALS[state.cat]}
  </div>`;

  let qBody = '';

  if (q.type==='mc') {
    qBody = `<div class="options-grid">${q.opts.map((o,i)=>{
      let cls='option-btn';
      if(done!==undefined){ if(i===q.ans) cls+=' correct'; else if(done===i) cls+=' wrong'; }
      return `<button class="${cls}" onclick="answerMC(${i})" ${done!==undefined?'disabled':''}>${o}</button>`;
    }).join('')}</div>`;

  } else if (q.type==='tf') {
    const tCls = done!==undefined ? (q.ans  ? 'tf-btn correct':'tf-btn wrong') : 'tf-btn';
    const fCls = done!==undefined ? (!q.ans ? 'tf-btn correct':'tf-btn wrong') : 'tf-btn';
    qBody = `<div class="tf-btns">
      <button class="${tCls}" onclick="answerTF(true)"  ${done!==undefined?'disabled':''}>✅ Verdadero</button>
      <button class="${fCls}" onclick="answerTF(false)" ${done!==undefined?'disabled':''}>❌ Falso</button>
    </div>`;

  } else if (q.type==='fill') {
    qBody = `<div class="fill-area">
      <input class="fill-blank" id="fillInput" placeholder="${q.hint||'...'}"
        ${done!==undefined?'disabled value="'+q.ans+'"':''}
        onkeydown="if(event.key==='Enter')checkFill()"/>
      ${done===undefined?`<button class="check-btn" onclick="checkFill()">Comprobar ✓</button>`:''}
    </div>`;

  } else if (q.type==='match') {
    const md = state.matchDone[key]||{};
    const lefts  = q.left.map((l,i)=>`<div class="match-item match-left${md[i]!==undefined?' matched':''}" onclick="selectMatch(${i},'l')">${l}</div>`).join('');
    const rights = q.right.map((r,i)=>`<div class="match-item match-right${Object.values(md).includes(i)?' matched':''}" onclick="selectMatch(${i},'r')">${r}</div>`).join('');
    qBody = `<div class="match-area"><div class="match-col">${lefts}</div><div class="match-col">${rights}</div></div>
      <div class="match-hint">Toca un elemento de la izquierda y luego uno de la derecha para emparejar.</div>`;
  }

  const fb = done!==undefined
    ? `<div class="feedback show ${done!==false&&done!=='wrong'?'ok':'no'}">${done!==false&&done!=='wrong'?'🎉 ¡Correcto! +'+q.pts+' puntos':'😅 ¡Casi! La respuesta es: '+q.ans}</div>`
    : '<div class="feedback" id="fb"></div>';

  const nav = `<div class="nav-btns">
    <button class="nav-btn" onclick="prevQ()" ${state.qIdx===0?'disabled':''}>← Anterior</button>
    <button class="nav-btn primary" onclick="nextQ()">${state.qIdx<qs.length-1?'Siguiente →':'Ver resumen 🏆'}</button>
  </div>`;

  document.getElementById('mainContent').innerHTML =
    progress + catH + visual +
    `<div class="question-card">
      <div class="q-header">
        <div class="q-num">${state.qIdx+1}</div>
        <div class="q-text">${q.text}</div>
        <span class="q-type-badge ${TYPE_CLS[q.type]}">${TYPE_BADGE[q.type]}</span>
      </div>
      ${qBody}${fb}
      <div class="q-points">Vale ${q.pts} puntos</div>
    </div>` + nav;
}

function answerMC(i) {
  const key=getKey(state.cat,state.qIdx);
  if(state.answered[key]!==undefined) return;
  const q=QUESTIONS[state.cat][state.qIdx];
  state.answered[key]=i;
  if(i===q.ans) CATS[state.cat].pts+=q.pts;
  render();
}
function answerTF(val) {
  const key=getKey(state.cat,state.qIdx);
  if(state.answered[key]!==undefined) return;
  const q=QUESTIONS[state.cat][state.qIdx];
  state.answered[key]=val;
  if(val===q.ans) CATS[state.cat].pts+=q.pts;
  render();
}
function checkFill() {
  const key=getKey(state.cat,state.qIdx);
  if(state.answered[key]!==undefined) return;
  const q=QUESTIONS[state.cat][state.qIdx];
  const inp=document.getElementById('fillInput');
  if(!inp) return;
  const val=inp.value.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const cor=q.ans.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const ok = val===cor || (cor.includes(val) && val.length>2);
  state.answered[key]=ok?true:'wrong';
  if(ok) CATS[state.cat].pts+=q.pts;
  render();
}
function selectMatch(idx, side) {
  const key=getKey(state.cat,state.qIdx);
  const q=QUESTIONS[state.cat][state.qIdx];
  if(!state.matchDone[key]) state.matchDone[key]={};
  const done=state.matchDone[key];
  if(Object.keys(done).length>=q.left.length) return;
  if(side==='l') {
    state.matchSel=idx;
    document.querySelectorAll('.match-left').forEach((el,i)=>{
      if(i===idx && done[i]===undefined) el.classList.add('selected');
      else el.classList.remove('selected');
    });
  } else if(side==='r' && state.matchSel!==null) {
    const li=state.matchSel;
    if(done[li]!==undefined) return;
    done[li]=idx;
    const correct=q.correct[li]===idx;
    if(correct) CATS[state.cat].pts+=Math.floor(q.pts/q.left.length);
    state.matchSel=null;
    if(Object.keys(done).length>=q.left.length) state.answered[key]=true;
    render();
  }
}
function nextQ() {
  const qs=QUESTIONS[state.cat];
  if(state.qIdx<qs.length-1){ state.qIdx++; state.matchSel=null; render(); }
  else showSummary();
}
function prevQ() {
  if(state.qIdx>0){ state.qIdx--; state.matchSel=null; render(); }
}
function switchCat(idx) {
  state.cat=idx; state.qIdx=0; state.matchSel=null; render();
}
function showSummary() {
  updateHeader();
  const pct = maxPts()>0 ? Math.round(totalPts()/maxPts()*100) : 0;
  let msg='¡Sigue explorando el universo!';
  if(pct>=90) msg='¡Eres un astronauta experto! 🧑‍🚀';
  else if(pct>=70) msg='¡Muy bien, eres un gran explorador! 🌟';
  else if(pct>=50) msg='¡Buen trabajo, sigue aprendiendo! 📚';

  const rows = CATS.map((c,i)=>{
    const mp=catMaxPts(i), pp=mp>0?Math.round(c.pts/mp*100):0;
    return `<div class="summary-row">
      <span style="font-size:20px">${c.emoji}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500;margin-bottom:4px">${c.name}</div>
        <div class="summary-bar-outer"><div class="summary-bar-inner" style="width:${pp}%"></div></div>
      </div>
      <span style="font-size:13px;color:#185FA5;font-weight:600;min-width:70px;text-align:right">${c.pts}/${mp} pts</span>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML =
    `<div class="congrats">
      <span class="big-emoji">🚀</span>
      <h2>${msg}</h2>
      <div class="star-display">${getStars()}</div>
      <p style="font-size:16px;font-weight:600;margin:8px 0;color:#185FA5">${totalPts()} / ${maxPts()} puntos (${pct}%)</p>
      <p>¡Completaste todas las preguntas de las 5 categorías!</p>
    </div>
    <div class="summary-card">
      <div style="font-size:14px;font-weight:500;margin-bottom:10px">Puntuación por categoría</div>
      ${rows}
    </div>
    <div class="nav-btns" style="margin-top:1rem;flex-wrap:wrap">
      ${CATS.map((c,i)=>`<button class="nav-btn" onclick="switchCat(${i})">${c.emoji} Repasar</button>`).join('')}
    </div>`;
}

render();
</script>
</body>
</html>
